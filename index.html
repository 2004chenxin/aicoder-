<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录注册 Demo</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .container { max-width: 300px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 8px 0; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.toggle { background: #008CBA; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title">登录</h2>
        <input id="username" placeholder="用户名" />
        <input id="password" type="password" placeholder="密码" />
        <button id="submitBtn">登录</button>
        <button class="toggle" id="toggleBtn">切换到注册</button>
    </div>
    <script>
        let isLogin = true;
        const title = document.getElementById("title");
        const submitBtn = document.getElementById("submitBtn");
        const toggleBtn = document.getElementById("toggleBtn");
        const username = document.getElementById("username");
        const password = document.getElementById("password");

        submitBtn.onclick = function() {
            alert((isLogin ? "登录" : "注册") + "：用户名=" + username.value + ", 密码=" + password.value);
        };
        toggleBtn.onclick = function() {
            isLogin = !isLogin;
            title.textContent = isLogin ? "登录" : "注册";
            submitBtn.textContent = isLogin ? "登录" : "注册";
            toggleBtn.textContent = isLogin ? "切换到注册" : "切换到登录";
        };
    </script>
</body>
</html>
